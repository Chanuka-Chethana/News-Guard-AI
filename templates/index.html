<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsGuard AI | Professional Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2c3e50;    /* Navy Blue */
            --accent: #3498db;     /* Bright Blue */
            --success: #27ae60;    /* Green */
            --danger: #c0392b;     /* Red */
            --bg: #f4f6f8;         /* Light Grey */
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .main-card {
            background: var(--white);
            width: 100%;
            max-width: 700px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            overflow: hidden;
            margin: 20px;
        }

        /* HEADER */
        .header {
            background: var(--primary);
            color: var(--white);
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            margin: 8px 0 0;
            opacity: 0.8;
            font-size: 0.95rem;
        }

        /* CONTENT AREA */
        .content {
            padding: 30px;
        }

        .input-group {
            position: relative;
        }

        .input-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #555;
            font-size: 0.9rem;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s ease;
            box-sizing: border-box; /* Fixes padding issues */
            background-color: #fafafa;
        }

        textarea:focus {
            border-color: var(--accent);
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
        }

        /* BUTTONS */
        .action-bar {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-analyze {
            background-color: var(--accent);
            color: white;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .btn-analyze:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }

        .btn-clear {
            background-color: #ecf0f1;
            color: #7f8c8d;
            border: 1px solid #bdc3c7;
            flex: 0 0 120px; /* Fixed width for clear button */
        }

        .btn-clear:hover {
            background-color: #e74c3c;
            color: white;
            border-color: #c0392b;
        }

        /* RESULT BOX */
        .result-wrapper {
            margin-top: 30px;
            display: none; /* Hidden by default via JS if needed */
        }

        /* This logic ensures the box shows if Flask sends data */
        {% if prediction %}
        .result-wrapper { display: block; animation: slideUp 0.5s ease; }
        {% endif %}

        .result-card {
            padding: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .fake-news {
            background-color: #fce4e4;
            border-left: 6px solid var(--danger);
            color: #8a1f1f;
        }

        .real-news {
            background-color: #dff0d8;
            border-left: 6px solid var(--success);
            color: #2c662d;
        }

        .icon-box {
            font-size: 2rem;
        }

        .text-box h2 {
            margin: 0;
            font-size: 1.4rem;
        }

        .confidence-meter {
            margin-top: 5px;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.8rem;
            color: #999;
            border-top: 1px solid #eee;
            background: #fafafa;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="header">
            <i class="fas fa-shield-alt fa-3x" style="opacity: 0.2; position: absolute; right: 30px; top: 20px;"></i>
            <h1>NewsGuard AI</h1>
            <p>Advanced Misinformation Detection System</p>
        </div>

        <div class="content">
            <form action="/predict" method="POST" id="newsForm">
                <div class="input-group">
                    <label class="input-label">Paste News Article</label>
                    <textarea 
                        id="newsInput" 
                        name="news_text" 
                        placeholder="Ex: 'Police arrested...' or paste a full paragraph." 
                        required>{{ original_text }}</textarea>
                </div>

                <div class="action-bar">
                    <button type="submit" class="btn btn-analyze">
                        <i class="fas fa-search"></i> Analyze Veracity
                    </button>
                    <button type="button" class="btn btn-clear" onclick="clearInterface()">
                        <i class="fas fa-eraser"></i> Clear
                    </button>
                </div>
            </form>

            {% if prediction %}
            <div class="result-wrapper" id="resultArea">
                <div class="result-card {{ css_class }}">
                    <div class="icon-box">
                        {% if 'FAKE' in prediction %}
                            <i class="fas fa-exclamation-triangle"></i>
                        {% else %}
                            <i class="fas fa-check-circle"></i>
                        {% endif %}
                    </div>
                    <div class="text-box">
                        <h2>{{ prediction }}</h2>
                        <div class="confidence-meter">
                            <i class="fas fa-chart-bar"></i> Confidence: <strong>{{ confidence }}</strong>
                        </div>
                    </div>
                </div>
            </div>
            {% endif %}
            
            {% if error %}
            <div style="color: red; margin-top: 15px; text-align: center;">
                <i class="fas fa-times-circle"></i> {{ error }}
            </div>
            {% endif %}
        </div>

        <div class="footer">
            &copy; 2026 News Guard AI. All rights reserved.
        </div>
    </div>

    <script>
        // FUNCTION TO CLEAR TEXT AND HIDE RESULTS
        function clearInterface() {
            // 1. Wipe the textarea
            document.getElementById('newsInput').value = '';
            
            // 2. Hide the result box if it exists
            const resultBox = document.getElementById('resultArea');
            if (resultBox) {
                resultBox.style.display = 'none';
                // Optional: Remove the 'prediction' from DOM to prevent it showing on soft reload
                resultBox.remove(); 
            }
            
            // 3. Set focus back to input for typing
            document.getElementById('newsInput').focus();
        }
    </script>

</body>
</html>
